    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    transition:background 0.5s ease;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit}
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield}

  .glass-card{
    background:var(--glass-bg);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);
    border-radius:var(--radius);
    box-shadow:var(--glass-shadow);
  }

  /* ======= Animations ======= */
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes softReveal{from{opacity:0;transform:scale(0.98)}to{opacity:1;transform:scale(1)}}
  @keyframes pulseSoft{0%,100%{opacity:.4}50%{opacity:.7}}
  .fade-in{animation:fadeIn .3s ease-out forwards}
  .soft-reveal{animation:softReveal .5s ease-out forwards}

  /* ======= Page system ======= */
  .page{display:none;min-height:100vh}
  .page.active{display:flex}

  /* ======= Intro ======= */
  #intro{position:fixed;inset:0;z-index:50;flex-direction:column;align-items:center;justify-content:center}
  .intro-btn{display:flex;flex-direction:column;align-items:center;gap:24px;transition:all .7s ease;background:none}
  .intro-btn.leaving{opacity:0;transform:scale(.9);filter:blur(4px)}
  .intro-logo-wrap{position:relative}
  .intro-logo-wrap::before{content:'';position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.1);filter:blur(48px);transform:scale(1.5);transition:background .5s}
  .intro-btn:hover .intro-logo-wrap::before{background:rgba(255,255,255,.2)}
  .intro-logo{width:160px;height:160px;border-radius:50%;position:relative;z-index:1;filter:drop-shadow(0 25px 25px rgba(0,0,0,.3));transition:transform .5s}
  .intro-btn:hover .intro-logo{transform:scale(1.1)}
  .intro-title{font-size:36px;font-weight:700;letter-spacing:.15em;color:#fff}
  .intro-sub{color:rgba(255,255,255,.5);font-size:13px;letter-spacing:.3em;text-transform:uppercase;margin-top:6px}
  .intro-hint{color:rgba(255,255,255,.3);font-size:12px;margin-top:32px;letter-spacing:.2em;text-transform:uppercase;animation:pulseSoft 2s infinite}

  /* ======= Onboarding ======= */
  #onboarding{position:fixed;inset:0;z-index:40;align-items:center;justify-content:center;padding:16px}
  .ob-card{width:100%;max-width:460px;padding:32px}
  .ob-h2{font-size:20px;font-weight:700;margin-bottom:8px}
  .ob-sub{color:rgba(255,255,255,.4);font-size:14px;margin-bottom:24px}
  .ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
  .ob-purpose{padding:14px 16px;border-radius:12px;font-size:14px;font-weight:500;text-align:left;transition:all .2s;background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.05)}
  .ob-purpose:hover{background:rgba(255,255,255,.1)}
  .ob-purpose.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.3)}
  .ob-input,.ob-select{width:100%;background:rgba(255,255,255,.1);color:#fff;outline:none;font-size:14px;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);transition:border-color .2s}
  .ob-input::placeholder{color:rgba(255,255,255,.3)}
  .ob-input:focus,.ob-select:focus{border-color:rgba(255,255,255,.3)}
  .ob-select{appearance:none;cursor:pointer}
  .ob-select option{background:#1a1a2e;color:#fff}
  .ob-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .ob-fields{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
  .ob-actions{display:flex;gap:12px}
  .btn-primary{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;background:rgba(255,255,255,.2);color:#fff;transition:all .2s}
  .btn-primary:hover{background:rgba(255,255,255,.3)}
  .btn-primary:disabled{opacity:.3;cursor:not-allowed}
  .btn-secondary{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:500;background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);transition:all .2s}
  .btn-secondary:hover{background:rgba(255,255,255,.1)}
  .btn-block{width:100%}

  /* ======= Task App ======= */
  #app{align-items:flex-start;justify-content:center;padding:40px 16px}
  .app-card{width:100%;max-width:680px;padding:28px}
  @media(min-width:640px){.app-card{padding:32px}}
  .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px}
  .app-title{font-size:24px;font-weight:700;letter-spacing:-.02em}
  @media(min-width:640px){.app-title{font-size:28px}}
  .app-purpose{color:rgba(255,255,255,.4);font-size:12px;margin-top:4px}
  .header-actions{display:flex;gap:8px}
  .icon-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:12px;font-size:14px;font-weight:500;transition:all .2s;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
  .icon-btn:hover{color:#fff;transform:scale(1.05)}
  .icon-btn.active{background:rgba(255,255,255,.2);color:#fff}
  .icon-btn svg{width:16px;height:16px}

  /* Theme switcher */
  .theme-wrap{position:relative}
  .theme-menu{position:absolute;right:0;top:calc(100% + 8px);background:rgba(0,0,0,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px;display:none;gap:8px;z-index:50}
  .theme-menu.open{display:flex}
  .theme-dot{width:32px;height:32px;border-radius:50%;border:2px solid transparent;transition:all .2s;cursor:pointer}
  .theme-dot:hover{transform:scale(1.1)}
  .theme-dot.active{border-color:#fff;transform:scale(1.1)}

  /* Charts */
  .charts-panel{margin-bottom:24px}
  .charts-grid{display:grid;gap:16px;grid-template-columns:1fr}
  @media(min-width:640px){.charts-grid{grid-template-columns:1fr 1fr}}
  .chart-card{padding:16px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.05);min-width:0;overflow:hidden}
  .chart-title{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:12px;text-transform:uppercase;letter-spacing:.1em}
  .chart-box{position:relative;height:180px;width:100%}
  .chart-card.full{grid-column:1/-1}

  /* Input */
  .task-input{width:100%;background:rgba(255,255,255,.1);color:#fff;outline:none;font-size:15px;padding:14px 18px;border-radius:12px;border:1px solid rgba(255,255,255,.1);transition:border-color .2s;margin-bottom:24px}
  .task-input::placeholder{color:rgba(255,255,255,.4)}
  .task-input:focus{border-color:rgba(255,255,255,.3)}

  /* Task list */
  .task-list{display:flex;flex-direction:column;gap:8px}
  .task{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.05);transition:all .3s;animation:fadeIn .3s ease-out}
  .task:hover{background:rgba(255,255,255,.1);transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,.15)}
  .task.completed{opacity:.5}
  .checkbox{width:20px;height:20px;border-radius:6px;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:transparent}
  .checkbox:hover{border-color:rgba(255,255,255,.6)}
  .checkbox.checked{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.3)}
  .task-text{flex:1;font-size:14px;cursor:text;color:#fff;transition:all .2s;word-break:break-word}
  .task.completed .task-text{text-decoration:line-through;color:rgba(255,255,255,.5)}
  .task-edit{flex:1;background:transparent;outline:none;font-size:14px;color:#fff;border:none;border-bottom:1px solid rgba(255,255,255,.4);padding:2px 0}
  .priority{font-size:11px;padding:4px 10px;border-radius:999px;font-weight:600;flex-shrink:0;transition:all .2s}
  .priority:hover{transform:scale(1.05)}
  .priority.low{background:rgba(6,214,160,.2);color:#06D6A0}
  .priority.medium{background:rgba(255,209,102,.2);color:#FFD166}
  .priority.high{background:rgba(255,77,109,.2);color:#FF4D6D}
  .delete-btn{flex-shrink:0;color:transparent;transition:all .2s;display:flex;align-items:center;justify-content:center}
  .task:hover .delete-btn{color:rgba(255,255,255,.4)}
  .delete-btn:hover{color:#FF4D6D !important;transform:scale(1.1)}
  .delete-btn svg{width:15px;height:15px}

  .empty{color:rgba(255,255,255,.4);font-size:14px;padding:48px 0;text-align:center}
  .stats{margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1);display:flex;gap:16px;font-size:12px;color:rgba(255,255,255,.4)}
</style>
</head>

    <div style="display:flex;flex-direction:column;align-items:center">

  </button>
</div>

<!-- ONBOARDING -->
<div id="onboarding" class="page">
  <div class="glass-card ob-card fade-in">

      <p class="ob-sub">This helps personalize your experience</p>
      <div class="ob-fields">
        <input id="obName" class="ob-input" placeholder="Name *" maxlength="100" />
        <div class="ob-row">
          <input id="obAge" class="ob-input" placeholder="Age" type="number" min="1" max="150" />
          <select id="obSex" class="ob-select">
            <option value="">Sex</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="ob-row">
          <input id="obHeight" class="ob-input" placeholder="Height (cm)" type="number" min="1" max="300" />
          <input id="obWeight" class="ob-input" placeholder="Weight (kg)" type="number" min="1" max="500" />
        </div>

</div>

        <div class="chart-card"><div class="chart-title">By Priority</div><div class="chart-box"><canvas id="priorityChart"></canvas></div></div>

</div>

let currentTheme = 'purple';
function applyTheme(name){
  currentTheme = name;
  const t = THEMES[name];
  document.documentElement.style.setProperty('--gradient', t.gradient);
  document.documentElement.style.setProperty('--bg-image', `url('${t.image}')`);

  });
}

/* ============ Page navigation ============ */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ============ Intro ============ */
const introBtn = document.getElementById('introBtn');
introBtn.addEventListener('click', ()=>{
  introBtn.classList.add('leaving');
  setTimeout(()=>showPage('onboarding'), 700);
});

/* ============ Onboarding ============ */
const PURPOSES = ['Personal Productivity','Work & Projects','Student / Academic','Health & Fitness','Habit Tracking','Other'];
let selectedPurpose = '';
let userData = {};
const purposeGrid = document.getElementById('purposeGrid');
PURPOSES.forEach(p=>{
  const b = document.createElement('button');
  b.className = 'ob-purpose';
  b.textContent = p;
  b.addEventListener('click', ()=>{
    selectedPurpose = p;
    document.querySelectorAll('.ob-purpose').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('obContinue').disabled = false;
  });
  purposeGrid.appendChild(b);
});
document.getElementById('obContinue').addEventListener('click', ()=>{
  document.getElementById('obStep1').style.display='none';
  document.getElementById('obStep2').style.display='block';
});
document.getElementById('obBack').addEventListener('click', ()=>{
  document.getElementById('obStep2').style.display='none';
  document.getElementById('obStep1').style.display='block';
});
const nameInput = document.getElementById('obName');
nameInput.addEventListener('input', ()=>{
  document.getElementById('obSubmit').disabled = !nameInput.value.trim();
});
document.getElementById('obSubmit').addEventListener('click', ()=>{
  if(!nameInput.value.trim()) return;
  userData = {
    name: nameInput.value.trim(),
    age: document.getElementById('obAge').value,
    sex: document.getElementById('obSex').value,
    height: document.getElementById('obHeight').value,
    weight: document.getElementById('obWeight').value,
    purpose: selectedPurpose,
  };
  document.getElementById('appTitle').textContent = `Hi, ${userData.name}`;
  if(userData.purpose){
    const p = document.getElementById('appPurpose');
    p.textContent = userData.purpose;
    p.style.display = 'block';
  }
  showPage('app');
});

/* ============ Theme switcher UI ============ */
const themeMenu = document.getElementById('themeMenu');
Object.entries(THEMES).forEach(([key,t])=>{
  const dot = document.createElement('button');
  dot.className = 'theme-dot' + (key===currentTheme?' active':'');
  dot.dataset.theme = key;
  dot.title = t.label;
  dot.style.background = t.gradient;
  dot.addEventListener('click', ()=>{
    applyTheme(key);
    themeMenu.classList.remove('open');
  });
  themeMenu.appendChild(dot);
});
document.getElementById('themeToggle').addEventListener('click', (e)=>{
  e.stopPropagation();
  themeMenu.classList.toggle('open');
});
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.theme-wrap')) themeMenu.classList.remove('open');
});

/* ============ Tasks ============ */
const PRIORITIES = ['low','medium','high'];
const DAY = 86400000;
let tasks = [
  {id:'1', text:'Review project proposal', completed:true, priority:'high', createdAt:Date.now()-DAY*6},
  {id:'2', text:'Design landing page mockups', completed:true, priority:'high', createdAt:Date.now()-DAY*5},
  {id:'3', text:'Set up CI/CD pipeline', completed:true, priority:'medium', createdAt:Date.now()-DAY*4},
  {id:'4', text:'Write unit tests for auth module', completed:false, priority:'high', createdAt:Date.now()-DAY*3},
  {id:'5', text:'Update API documentation', completed:false, priority:'medium', createdAt:Date.now()-DAY*3},
  {id:'6', text:'Fix responsive layout issues', completed:true, priority:'medium', createdAt:Date.now()-DAY*2},
  {id:'7', text:'Optimize database queries', completed:false, priority:'low', createdAt:Date.now()-DAY*2},
  {id:'8', text:'Prepare sprint retrospective', completed:false, priority:'low', createdAt:Date.now()-DAY},
  {id:'9', text:'Deploy staging environment', completed:true, priority:'high', createdAt:Date.now()-DAY},
  {id:'10', text:'Code review for PR #42', completed:false, priority:'medium', createdAt:Date.now()},
];

const taskList = document.getElementById('taskList');
const taskInput = document.getElementById('taskInput');
const emptyMsg = document.getElementById('emptyMsg');
const statsEl = document.getElementById('stats');

function uid(){ return (crypto.randomUUID && crypto.randomUUID()) || String(Date.now()+Math.random()); }

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  taskList.innerHTML = '';
  tasks.forEach(t=>{
    const row = document.createElement('div');
    row.className = 'task' + (t.completed?' completed':'');

    const cb = document.createElement('button');
    cb.className = 'checkbox' + (t.completed?' checked':'');
    cb.innerHTML = t.completed
      ? '<svg width="12" height="12" viewBox="0 0 10 10" fill="none"><path d="M2 5L4 7L8 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : '';
    cb.addEventListener('click', ()=>{ t.completed=!t.completed; render(); });
    row.appendChild(cb);

    const text = document.createElement('span');
    text.className = 'task-text';
    text.textContent = t.text;
    text.addEventListener('click', ()=>{
      if(t.completed) return;
      const inp = document.createElement('input');
      inp.className = 'task-edit';
      inp.value = t.text;
      text.replaceWith(inp);
      inp.focus();
      const finish = ()=>{ if(inp.value.trim()) t.text = inp.value.trim(); render(); };
      inp.addEventListener('blur', finish);
      inp.addEventListener('keydown', e=>{ if(e.key==='Enter') finish(); });
    });
    row.appendChild(text);

    const pr = document.createElement('button');
    pr.className = 'priority ' + t.priority;
    pr.textContent = t.priority.charAt(0).toUpperCase()+t.priority.slice(1);
    pr.addEventListener('click', ()=>{
      const idx = PRIORITIES.indexOf(t.priority);
      t.priority = PRIORITIES[(idx+1)%3];
      render();
    });
    row.appendChild(pr);

    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
    del.addEventListener('click', ()=>{ tasks = tasks.filter(x=>x.id!==t.id); render(); });
    row.appendChild(del);

    taskList.appendChild(row);
  });

  emptyMsg.style.display = tasks.length===0 ? 'block' : 'none';
  if(tasks.length>0){
    statsEl.style.display = 'flex';
    const done = tasks.filter(t=>t.completed).length;
    statsEl.innerHTML = `<span>${tasks.length} total</span><span>${done} completed</span><span>${tasks.length-done} remaining</span>`;
  } else {
    statsEl.style.display = 'none';
  }

  updateCharts();
}

taskInput.addEventListener('keydown', e=>{
  if(e.key==='Enter' && taskInput.value.trim()){
    tasks.push({id:uid(), text:taskInput.value.trim(), completed:false, priority:'medium', createdAt:Date.now()});
    taskInput.value='';
    render();
  }
});

/* ============ Charts ============ */
let statusChart, priorityChart, timelineChart;
const chartsPanel = document.getElementById('chartsPanel');
const toggleChartsBtn = document.getElementById('toggleCharts');
let chartsOpen = false;
toggleChartsBtn.addEventListener('click', ()=>{
  chartsOpen = !chartsOpen;
  chartsPanel.style.display = chartsOpen ? 'block' : 'none';
  toggleChartsBtn.classList.toggle('active', chartsOpen);
  if(chartsOpen) setTimeout(initCharts, 30);
});

function initCharts(){
  Chart.defaults.color = 'rgba(255,255,255,0.7)';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.1)';
  Chart.defaults.font.family = "'Poppins','Inter',sans-serif";

  if(statusChart) statusChart.destroy();
  if(priorityChart) priorityChart.destroy();
  if(timelineChart) timelineChart.destroy();

  const done = tasks.filter(t=>t.completed).length;
  const pending = tasks.length - done;

  statusChart = new Chart(document.getElementById('statusChart'), {
    type:'doughnut',
    data:{
      labels:['Completed','Pending'],
      datasets:[{data:[done,pending], backgroundColor:['#06D6A0','#FFD166'], borderWidth:0}]
    },
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom', labels:{boxWidth:10, padding:12, font:{size:11}}}}}
  });

  const counts = {high:[0,0], medium:[0,0], low:[0,0]};
  tasks.forEach(t=>{ counts[t.priority][0]++; if(t.completed) counts[t.priority][1]++; });

  priorityChart = new Chart(document.getElementById('priorityChart'), {
    type:'bar',
    data:{
      labels:['High','Medium','Low'],
      datasets:[
        {label:'Total', data:[counts.high[0], counts.medium[0], counts.low[0]], backgroundColor:'rgba(255,255,255,0.3)', borderRadius:6},
        {label:'Completed', data:[counts.high[1], counts.medium[1], counts.low[1]], backgroundColor:['#FF4D6D','#FFD166','#06D6A0'], borderRadius:6}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{boxWidth:10, padding:12, font:{size:11}}}},
      scales:{y:{beginAtZero:true, ticks:{stepSize:1, font:{size:10}}, grid:{color:'rgba(255,255,255,0.05)'}}, x:{ticks:{font:{size:11}}, grid:{display:false}}}
    }
  });

  // Timeline: group by day
  const buckets = {};
  tasks.forEach(t=>{
    const d = new Date(t.createdAt); d.setHours(0,0,0,0);
    const k = d.getTime();
    if(!buckets[k]) buckets[k] = {added:0, completed:0};
    buckets[k].added++;
    if(t.completed) buckets[k].completed++;
  });
  const keys = Object.keys(buckets).map(Number).sort();
  const labels = keys.map(k=>{
    const d = new Date(k); return `${d.getMonth()+1}/${d.getDate()}`;
  });

  timelineChart = new Chart(document.getElementById('timelineChart'), {
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'Added', data:keys.map(k=>buckets[k].added), borderColor:'#6366F1', backgroundColor:'rgba(99,102,241,0.2)', fill:true, tension:0.4, borderWidth:2, pointRadius:3},
        {label:'Completed', data:keys.map(k=>buckets[k].completed), borderColor:'#06D6A0', backgroundColor:'rgba(6,214,160,0.2)', fill:true, tension:0.4, borderWidth:2, pointRadius:3}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{boxWidth:10, padding:12, font:{size:11}}}},
      scales:{y:{beginAtZero:true, ticks:{stepSize:1, font:{size:10}}, grid:{color:'rgba(255,255,255,0.05)'}}, x:{ticks:{font:{size:10}}, grid:{display:false}}}
    }
  });
}

function updateCharts(){
  if(chartsOpen) initCharts();
}

render();
</script>
</body>
</html>
