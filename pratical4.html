<!DOCTYPE html>
<html>
<head>
    <title>Student Timetable</title>
    <style>
        body {
            text-align: center;
        }
        table {
            margin: 0 auto; /* Centers the table */
            border-collapse: collapse;
        }
    </style>
</head>
<body>

    <tr><td>10:00 - 11:00</td><td>English</td></tr>
    <tr><td>11:00 - 12:00</td><td>Science</td></tr>
    <tr><td>12:00 - 1:00</td><td>Sports</td></tr>
    <tr><td>1:00 - 2:00</td><td>Lunch</td></tr>
    <tr><td>2:00 - 3:00</td><td>Computer</td></tr>
    <tr><td>3:00 - 4:00</td><td>Social Studies</td></tr>
</table>

</body>
</html>
